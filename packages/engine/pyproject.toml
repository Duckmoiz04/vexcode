[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "vexcode-engine"
version = "0.1.0"
description = "VexCode static analysis engine — security scan, AST enrichment, AI remediation"
requires-python = ">=3.12"
dependencies = [
    "requests>=2.31.0",
    "networkx>=3.1",
    "semgrep>=1.65.0",
    "python-dotenv>=1.0.1",
    "lizard>=1.17.10",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = []
