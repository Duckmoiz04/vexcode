# VexCode Engine — Centralized Configuration
#
# This file contains all non-secret defaults. Secrets (API keys) stay in .env.
# Environment variables override these values at runtime.
#
# Auto-generated by config_cli.py — do not edit manually.

[analysis]
max_code_chars = 3000
max_naming_audit_files = 3
max_resolve_findings = 5
ccn_threshold = 25
cognitive_threshold = 15
dup_min_lines = 6
dup_min_tokens = 50
max_files_for_complexity = 100
max_naming_audit_candidates = 5

[ai_settings]
resolve_max_tokens = 512
request_cooldown_seconds = 8.0
max_retries = 2
retry_base_wait_seconds = 15.0
resolve_timeout_seconds = 90
naming_timeout_seconds = 90
parallel_workers = 3

[ai]
enabled = false

[ai.providers.openai]
enabled = true
requires_key = true
model = "gpt-4o-mini"
base_url = "https://api.openai.com/v1"

[ai.providers.anthropic]
enabled = true
requires_key = true
model = "claude-3-haiku-20240307"
base_url = "https://api.anthropic.com"

[ai.providers.google]
enabled = true
requires_key = true
model = "gemini-1.5-flash"
base_url = "https://generativelanguage.googleapis.com"

[ai.providers.9router]
enabled = false
requires_key = false
model = "openai/gpt-4o-mini"
base_url = "http://localhost:20128/v1"

[ai.providers.nvidia]
enabled = true
requires_key = true
model = "minimaxai/minimax-m2.7"
base_url = "https://integrate.api.nvidia.com/v1"

# ---- Multi-Agent Pipeline Agents ----
# Each agent maps to a provider above. Provider can be overridden per agent.
# Model override (optional): if set, uses this model instead of provider's default.

[ai.agents.analyze]
enabled = true
provider = "openai"

[ai.agents.fix]
enabled = true
provider = "nvidia"

[ai.agents.review]
enabled = true
provider = "openai"

[ai.agents.suggest]
enabled = false
provider = "9router"
model = ""

[ai.agents.naming]
enabled = true
provider = "openai"

[gitleaks]
enabled = true
timeout_seconds = 120

[ruff]
enabled = true
timeout_seconds = 60
# Optional: comma-separated rule selectors (e.g., ["S", "B", "N"] for security, bug, naming)
select = []
# Optional: comma-separated rule codes to ignore
ignore = []

[osv]
enabled = true
timeout_seconds = 30

[semgrep]
custom_rules_path = "semgrep-rules/custom"

[thresholds]
max_critical = 0
max_high = 10
max_total = 100
max_files_with_errors = 20
min_rating = "C"
