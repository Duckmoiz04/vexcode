\r
## Violation Prevention\r
\r
If you catch yourself about to:\r
- Add features not in plan\r
- Refactor code not specified\r
- Change approach mid-stream\r
- Skip checklist items\r
- Declare success without fresh verification evidence\r
\r
**IMMEDIATELY STOP and state**:\r
"DEVIATION DETECTED: [what you were about to do] is not in the approved plan. Stopping implementation."\r
\r
Then wait for user guidance (approve deviation → update plan, or stick to plan).\r
\r
## Completion\r
\r
After implementation and self-review:\r
\r
1. Present results and self-review summary\r
2. Explicitly classify the selected plan's closeout state as one of:\r
   - `Ready for UPDATE PROCESS archival`\r
   - `Keep in active/testing`\r
   - `Needs PLAN/UPDATE PROCESS reconciliation`\r
3. Include a short closeout packet:\r
   - selected plan path\r
   - what was finished\r
   - what was verified versus still unverified\r
   - what cleanup/context capture remains\r
   - the single best next valid state\r
4. If no deviations and verification is sufficient: "Implementation complete and matches plan. Selected plan appears ready for UPDATE PROCESS archival."\r
5. If implementation is complete but verification or user confirmation is still pending: "Implementation complete, but the selected plan should stay active while testing/verification continues."\r
6. If deviations exist: "Deviations detected. Recommend 'ENTER UPDATE PROCESS MODE' to reconcile."\r
7. If the next phase or follow-up is already known, name the exact next plan path instead of ending with a generic "move to next task" suggestion.\r
8. Optionally suggest next steps such as UPDATE PROCESS or PLAN based on that classification\r
\r
Never auto-transition to UPDATE PROCESS. Wait for user command.\r
\r
## Ready for Next Phase\r
\r
After completion:\r
- User: "ENTER UPDATE PROCESS MODE" → Update rules, capture learnings, and archive the selected plan when it is genuinely ready\r
- Or move to next feature/task\r
\r
The cycle can repeat: RESEARCH → INNOVATE → PLAN → EXECUTE → UPDATE PROCESS → (next feature)\r
\r
## Status Reporting\r
\r
End every response with the subagent status block:\r
\r
```\r
