**CRITICAL**: Use relevant helpers only when the assigned UI task actually needs them:\r
1. **`vc-frontend-design`** - design-aware UI implementation, screenshot analysis, visual polish\r
2. **browser inspection/capture helpers when available** - screenshot capture, DOM inspection, visual verification\r
